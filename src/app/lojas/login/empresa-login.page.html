<ion-content [fullscreen]="true" class="login-content">

  <div class="background-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <div class="login-container">

    <!-- Header -->
    <div class="header-section">
      <button class="back-btn" (click)="voltar()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>

      <div class="logo-container">
        <div class="logo-wrapper">
          <img src="../../../assets/logo_lado.png" alt="Logo Drop" class="logo-image" />
        </div>
      </div>

      <div class="welcome-text">
        <div class="badge">
          <ion-icon name="storefront-outline"></ion-icon>
          <span>Área da Empresa</span>
        </div>
        <h1>Bem-vindo de volta!</h1>
        <p>Acesse o painel da sua loja</p>
      </div>
    </div>

    <!-- Formulário -->
    <div class="form-section">

      <div class="input-group">

        <div class="input-container">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <ion-input
            type="email"
            placeholder="E-mail da loja"
            [(ngModel)]="email"
            name="email"
            class="custom-input"
            [disabled]="isLoading">
          </ion-input>
        </div>

        <div class="input-container">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Senha"
            [(ngModel)]="senha"
            name="senha"
            class="custom-input"
            [disabled]="isLoading">
          </ion-input>
          <ion-button fill="clear" class="password-toggle" (click)="togglePassword()">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </div>

      </div>

      <div class="forgot-password">
        <a class="forgot-link">Esqueci minha senha</a>
      </div>

      <ion-button
        expand="block"
        class="login-button"
        (click)="login()"
        [disabled]="isLoading">
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">ENTRAR</span>
        <span *ngIf="isLoading">ENTRANDO...</span>
      </ion-button>

      <div class="links-section">
        <div class="divider"><span>ou</span></div>
        <div class="auth-links">
          <a (click)="irParaCadastro()" class="signup-link">
            <ion-icon name="storefront-outline"></ion-icon>
            Cadastrar minha loja
          </a>
        </div>
      </div>

    </div>
  </div>
</ion-content>
