<ion-content class="perfil-content">

  <!-- Banner + foto -->
  <div class="banner-section">
    <div class="banner-wrapper" (click)="trocarBanner()">
      <img *ngIf="bannerUrl" [src]="bannerUrl" class="banner-img" />
      <div *ngIf="!bannerUrl" class="banner-placeholder">
        <ion-icon name="image-outline"></ion-icon>
        <span>Adicionar banner</span>
      </div>
      <div class="banner-overlay">
        <ion-icon name="camera-outline"></ion-icon>
      </div>
    </div>

    <div class="logo-wrapper" (click)="trocarLogo()">
      <img *ngIf="logoUrl" [src]="logoUrl" class="logo-img" />
      <div *ngIf="!logoUrl" class="logo-placeholder">
        <ion-icon name="storefront-outline"></ion-icon>
      </div>
      <div class="logo-camera">
        <ion-icon name="camera-outline"></ion-icon>
      </div>
    </div>
  </div>

  <!-- Info da loja -->
  <div class="info-section">
    <h2 class="loja-nome">{{ form.nome || 'Minha Loja' }}</h2>
    <p class="loja-email">{{ emailLoja }}</p>
    <div class="loja-categoria" *ngIf="categoriaNome">
      <ion-icon name="grid-outline"></ion-icon>
      <span>{{ categoriaNome }}</span>
    </div>
  </div>

  <!-- Formulário -->
  <div class="form-section">

    <!-- Dados da loja -->
    <p class="section-title">
      <ion-icon name="storefront-outline"></ion-icon>
      Dados da loja
    </p>

    <div class="input-container">
      <ion-icon name="storefront-outline" class="input-icon"></ion-icon>
      <ion-input
        type="text"
        placeholder="Nome do estabelecimento"
        [(ngModel)]="form.nome"
        class="custom-input">
      </ion-input>
    </div>

    <!-- Localização -->
    <p class="section-title" style="margin-top: 8px">
      <ion-icon name="location-outline"></ion-icon>
      Localização
    </p>

    <div class="input-container">
      <ion-icon name="location-outline" class="input-icon"></ion-icon>
      <ion-input
        type="text"
        placeholder="Rua / Avenida"
        [(ngModel)]="form.localizacao"
        class="custom-input">
      </ion-input>
    </div>

    <div class="input-row">
      <div class="input-container small">
        <ion-icon name="home-outline" class="input-icon"></ion-icon>
        <ion-input
          type="text"
          placeholder="Número"
          [(ngModel)]="form.numero_endereco"
          class="custom-input">
        </ion-input>
      </div>

      <div class="input-container grow">
        <ion-icon name="map-outline" class="input-icon"></ion-icon>
        <ion-input
          type="text"
          placeholder="Bairro"
          [(ngModel)]="form.bairro"
          class="custom-input">
        </ion-input>
      </div>
    </div>

    <div class="input-container">
      <ion-icon name="business-outline" class="input-icon"></ion-icon>
      <ion-input
        type="text"
        placeholder="Cidade"
        [(ngModel)]="form.cidade"
        class="custom-input">
      </ion-input>
    </div>

    <ion-button
      expand="block"
      class="save-btn"
      (click)="salvarPerfil()"
      [disabled]="isSaving">
      <ion-spinner *ngIf="isSaving" name="crescent"></ion-spinner>
      <span *ngIf="!isSaving">Salvar alterações</span>
    </ion-button>

    <div class="divider"></div>

    <p class="section-title danger">
      <ion-icon name="log-out-outline"></ion-icon>
      Conta
    </p>

    <ion-button expand="block" fill="outline" class="logout-btn" (click)="sair()">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Sair da conta
    </ion-button>

  </div>

  <input type="file" #fileLogo   accept="image/*" (change)="onLogoChange($event)"   style="display:none" />
  <input type="file" #fileBanner accept="image/*" (change)="onBannerChange($event)" style="display:none" />

</ion-content>
