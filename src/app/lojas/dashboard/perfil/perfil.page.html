<ion-content [fullscreen]="true" class="perfil-container">

  <div class="header-premium" [style.backgroundImage]="bannerUrl ? 'url(' + bannerUrl + ')' : 'linear-gradient(135deg, #99521c 0%, #7a4116 100%)'">
    <div class="header-overlay"></div>
    <div class="header-decoration"></div>
    
    <button class="edit-banner-btn" (click)="trocarBanner()">
      <ion-icon name="image-outline"></ion-icon>
      <span>Trocar Banner</span>
    </button>
    
    <div class="header-content">
      <div class="avatar-wrapper" (click)="trocarLogo()">
        <div class="avatar-ring"></div>
        <div class="avatar-image">
          <div *ngIf="logoUrl" class="bg-avatar" [style.backgroundImage]="'url(' + logoUrl + ')'"></div>
          <ion-icon *ngIf="!logoUrl" name="storefront"></ion-icon>
        </div>
        <div class="camera-badge">
          <ion-icon name="camera"></ion-icon>
        </div>
      </div>
      
      <div class="user-details">
        <h1 class="user-name">{{ form.nome || 'Minha Loja' }}</h1>
        <p class="user-email">{{ emailLoja }}</p>
        <div class="user-badge" *ngIf="categoriaNome">
          <ion-icon name="grid-outline"></ion-icon>
          <span>{{ categoriaNome }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="section-header">
      <h2>DADOS DA LOJA</h2>
      <div class="section-line"></div>
    </div>
    
    <div class="form-container">
      
      <div class="input-item">
        <ion-icon name="storefront-outline" class="input-icon"></ion-icon>
        <div class="input-wrapper">
          <label>Nome do Estabelecimento</label>
          <input type="text" [(ngModel)]="form.nome" placeholder="Digite o nome" />
        </div>
      </div>

      <div class="input-row">
        <div class="input-item grow">
          <ion-icon name="location-outline" class="input-icon"></ion-icon>
          <div class="input-wrapper">
            <label>Endereço</label>
            <input type="text" [(ngModel)]="form.localizacao" placeholder="Rua, Av..." />
          </div>
        </div>

        <div class="input-item small">
          <ion-icon name="home-outline" class="input-icon"></ion-icon>
          <div class="input-wrapper">
            <label>Nº</label>
            <input type="text" [(ngModel)]="form.numero_endereco" placeholder="123" />
          </div>
        </div>
      </div>

      <div class="input-row">
        <div class="input-item grow">
          <ion-icon name="map-outline" class="input-icon"></ion-icon>
          <div class="input-wrapper">
            <label>Bairro</label>
            <input type="text" [(ngModel)]="form.bairro" placeholder="Seu bairro" />
          </div>
        </div>
        
        <div class="input-item grow">
          <ion-icon name="business-outline" class="input-icon"></ion-icon>
          <div class="input-wrapper">
            <label>Cidade</label>
            <input type="text" [(ngModel)]="form.cidade" placeholder="Sua cidade" />
          </div>
        </div>
      </div>

      <button class="save-btn" (click)="salvarPerfil()" [disabled]="isSaving">
        <ion-spinner *ngIf="isSaving" name="crescent"></ion-spinner>
        <span *ngIf="!isSaving">Salvar Alterações</span>
        <ion-icon *ngIf="!isSaving" name="checkmark-circle-outline"></ion-icon>
      </button>

    </div>
  </div>

  <div class="logout-container">
    <button class="logout-btn" (click)="sair()">
      <ion-icon name="log-out-outline"></ion-icon>
      <span>Sair da Conta</span>
    </button>
  </div>

  <div class="version-info">
    <p>Versão 1.0.0 • © 2026</p>
  </div>

  <input type="file" #fileLogo accept="image/*" style="display:none;" (change)="onLogoChange($event)">
  <input type="file" #fileBanner accept="image/*" style="display:none;" (change)="onBannerChange($event)">

</ion-content>
