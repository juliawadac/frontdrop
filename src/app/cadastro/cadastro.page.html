<ion-content class="cadastro-content">

  <div class="background-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <!-- Botão voltar -->
  <div class="back-button-container">
    <ion-button fill="clear" class="back-button" routerLink="/welcome">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </ion-button>
  </div>

  <div class="cadastro-container">

    <div class="header-section">
      <div class="logo-container">
        <div class="logo-wrapper">
          <img src="../../assets/logo_mini.png" alt="Logo Drop" />
        </div>
      </div>

      <div class="welcome-text">
        <h1 *ngIf="!etapaVerificacao">Criar Conta</h1>
        <h1 *ngIf="etapaVerificacao">Verificar E-mail</h1>

        <p *ngIf="!etapaVerificacao">Preencha os dados para se cadastrar</p>
        <p *ngIf="etapaVerificacao">Enviámos um código para o seu e-mail</p>
      </div>
    </div>

    <form class="cadastro-form">

      <!-- ========== ETAPA 1: FORMULÁRIO ========== -->
      <div class="form-section" *ngIf="!etapaVerificacao">

        <div class="form-group">
          <h3 class="group-title">
            <ion-icon name="person-outline"></ion-icon>
            Dados Pessoais
          </h3>

          <div class="input-row">
            <div class="input-container half-width">
              <ion-icon name="person-outline" class="input-icon"></ion-icon>
              <ion-input
                placeholder="Nome"
                [(ngModel)]="nome"
                name="nome"
                class="custom-input"
                [disabled]="isLoading">
              </ion-input>
            </div>

            <div class="input-container half-width">
              <ion-icon name="people-outline" class="input-icon"></ion-icon>
              <ion-input
                placeholder="Sobrenome"
                [(ngModel)]="sobrenome"
                name="sobrenome"
                class="custom-input"
                [disabled]="isLoading">
              </ion-input>
            </div>
          </div>
        </div>

        <div class="form-group">
          <h3 class="group-title">
            <ion-icon name="key-outline"></ion-icon>
            Dados de Acesso
          </h3>

          <div class="input-container">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <ion-input
              type="email"
              placeholder="Email"
              [(ngModel)]="email"
              name="email"
              class="custom-input"
              [disabled]="isLoading">
            </ion-input>
          </div>

          <div class="input-container">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Senha (mín. 6 caracteres)"
              [(ngModel)]="senha"
              name="senha"
              class="custom-input"
              [disabled]="isLoading">
            </ion-input>
            <ion-button fill="clear" class="password-toggle" (click)="togglePassword()">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </div>
        </div>

        <div class="form-group">
          <h3 class="group-title">
            <ion-icon name="location-outline"></ion-icon>
            Endereço
          </h3>

          <div class="input-container">
            <ion-icon name="home-outline" class="input-icon"></ion-icon>
            <ion-input
              placeholder="Rua / Avenida"
              [(ngModel)]="endereco"
              name="endereco"
              class="custom-input"
              [disabled]="isLoading">
            </ion-input>
          </div>

          <div class="input-container">
            <ion-icon name="keypad-outline" class="input-icon"></ion-icon>
            <ion-input
              type="number"
              placeholder="Número"
              [(ngModel)]="numero_endereco"
              name="numero"
              class="custom-input"
              [disabled]="isLoading">
            </ion-input>
          </div>
        </div>

        <ion-button
          expand="block"
          class="btn-cadastrar"
          (click)="solicitarCodigo()"
          [disabled]="isLoading">
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">RECEBER CÓDIGO</span>
          <span *ngIf="isLoading">A ENVIAR...</span>
        </ion-button>

        <div class="links-section">
          <div class="divider"><span>ou</span></div>
          <div class="auth-links">
            <a routerLink="/login" class="login-link">
              <ion-icon name="log-in-outline"></ion-icon>
              Já tenho uma conta
            </a>
          </div>
        </div>

      </div>

      <!-- ========== ETAPA 2: CÓDIGO ========== -->
      <div class="form-section" *ngIf="etapaVerificacao">

        <div class="form-group">
          <div class="ion-text-center" style="margin-bottom: 24px;">
            <ion-icon name="mail-open-outline" style="font-size: 56px; color: #99521c;"></ion-icon>
            <p style="color: #777; font-size: 14px; margin-top: 10px;">
              Insira o código enviado para:<br>
              <strong style="color: #2c1810;">{{ email }}</strong>
            </p>
          </div>

          <div class="input-container">
            <ion-icon name="keypad-outline" class="input-icon"></ion-icon>
            <ion-input
              type="text"
              placeholder="000000"
              maxlength="6"
              [(ngModel)]="codigoInserido"
              name="codigo"
              class="custom-input"
              style="font-size: 24px; letter-spacing: 6px; font-weight: 700; text-align: center;"
              [disabled]="isLoading">
            </ion-input>
          </div>
        </div>

        <ion-button
          expand="block"
          class="btn-cadastrar"
          (click)="cadastrar()"
          [disabled]="isLoading">
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">CONFIRMAR CADASTRO</span>
          <span *ngIf="isLoading">A CADASTRAR...</span>
        </ion-button>

        <div class="links-section">
          <div class="auth-links" style="margin-top: 12px;">
            <a (click)="etapaVerificacao = false" class="login-link" style="cursor: pointer;">
              <ion-icon name="arrow-back-outline"></ion-icon>
              Voltar e corrigir dados
            </a>
          </div>
        </div>

      </div>

    </form>
  </div>
</ion-content>
