<ion-content [fullscreen]="true" class="page-container">

  <div *ngIf="estabelecimento" class="header"
       [ngStyle]="{'background-image': 'url(' + (estabelecimento.banner_url || 'assets/mcdonalds-banner.webp') + ')'}">
    <div class="header-overlay"></div>
    <img [src]="estabelecimento.logo_url || 'assets/mcquadrado.png'" class="logo" />
    <div class="header-info">
      <h1>{{ estabelecimento.nome }}</h1>
      <div class="status-badge">
        <ion-icon name="time-outline"></ion-icon>
        <span>{{ estabelecimento.tempo_de_espera || 'N/A' }} min</span>
      </div>
    </div>
  </div>

  <div class="location-section" *ngIf="estabelecimento">
    <div class="section-header">
      <ion-icon name="location-outline" class="section-icon"></ion-icon>
      <h2>LOCALIZAÇÃO</h2>
    </div>
    <div class="map-container">
      <img [src]="estabelecimento.mapa_url || 'assets/mapa-placeholder.png'" 
           [alt]="'Mapa de ' + estabelecimento.nome" 
           class="map" />
      
      <div class="map-overlay">
        <ion-button fill="outline" size="small" class="directions-btn" (click)="abrirMapa()">
          <ion-icon name="navigate-outline" slot="start"></ion-icon>
          Como chegar
        </ion-button>
      </div>
    </div>
  </div>

  <div class="produtos-section">
    <div class="section-header">
      <ion-icon name="restaurant-outline" class="section-icon"></ion-icon>
      <h2>CARDÁPIO</h2>
    </div>

    <div class="produtos-grid">
      <ion-card *ngFor="let produto of produtos; let i = index" class="produto-card">
        <ion-card-content class="produto-content">
          <div class="produto-image">
            <div class="produto-img"><ion-icon name="fast-food-outline"></ion-icon></div>
          </div>
          <div class="produto-details">
            <div class="produto-info">
              <h3>{{ produto.nome }}</h3>
              <p class="produto-desc">{{ produto.descricao }}</p>
              <div class="produto-price">
                <span class="currency">R$</span>
                <span class="value">{{ produto.preco | number:'1.2-2' }}</span>
              </div>
            </div>
            <div class="produto-actions">
              <div class="quantity-controls">
                <ion-button fill="clear" (click)="diminuirQuantidade(i)"><ion-icon name="remove-outline"></ion-icon></ion-button>
                <span class="quantity">{{ produto.quantidade }}</span>
                <ion-button fill="clear" (click)="aumentarQuantidade(i)"><ion-icon name="add-outline"></ion-icon></ion-button>
              </div>
              <ion-button (click)="adicionarAoCarrinho(i)" [disabled]="produto.quantidade === 0" class="add-to-cart-btn">
                ADICIONAR
              </ion-button>
            </div>
          </div>
        </ion-card-content>
      </ion-card>
    </div>
  </div>

  <div class="fixed-bottom-nav">
    <div class="nav-content">
      <div class="nav-item" (click)="goToTab('home')"><ion-icon name="home"></ion-icon><span>Início</span></div>
      <div class="nav-item" (click)="goToTab('search')"><ion-icon name="search"></ion-icon><span>Buscar</span></div>
      <div class="nav-item" (click)="goToTab('sacola')"><ion-icon name="bag-handle"></ion-icon><span>Sacola</span></div>
      <div class="nav-item" (click)="goToTab('perfil')"><ion-icon name="person"></ion-icon><span>Perfil</span></div>
    </div>
  </div>

</ion-content>
